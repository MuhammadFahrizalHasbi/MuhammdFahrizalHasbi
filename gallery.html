<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeri Foto Kreatif</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background-color: #0f172a;
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 50px 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Container Galeri */
        .gallery-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            width: 100%;
            max-width: 1200px;
        }

        /* Item Galeri */
        .gallery-item {
            position: relative;
            height: 350px;
            border-radius: 20px;
            overflow: hidden;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Overlay Hitam Transparan */
        .overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, transparent 100%);
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 30px;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .overlay h3 {
            font-size: 1.2rem;
            margin-bottom: 5px;
            transform: translateY(20px);
            transition: transform 0.4s ease;
        }

        .overlay p {
            font-size: 0.9rem;
            color: #cbd5e1;
            transform: translateY(20px);
            transition: transform 0.4s ease 0.1s;
        }

        /* Efek Hover */
        .gallery-item:hover img {
            transform: scale(1.1);
        }

        .gallery-item:hover .overlay {
            opacity: 1;
        }

        .gallery-item:hover h3, 
        .gallery-item:hover p {
            transform: translateY(0);
        }

        /* Tombol Navigasi */
        .nav-btn {
            margin-top: 50px;
            padding: 12px 35px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            transition: 0.3s;
        }

        .nav-btn:hover {
            background: white;
            color: #0f172a;
        }

        @media (max-width: 600px) {
            .header h1 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Koleksi Visual</h1>
        <p>Momentum yang tertangkap dalam lensa</p>
    </div>

    <div class="gallery-container">
        <div class="gallery-item">
            <img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb?q=80&w=1000" alt="Alam">
            <div class="overlay">
                <h3>Landscape Alam</h3>
                <p>Keindahan pegunungan di pagi hari.</p>
            </div>
        </div>

        <div class="gallery-item">
            <img src="Foto kanan.jpeg/" alt="Foto kanan.jpeg">
            <div class="overlay">
                <h3>Hutan Pinus</h3>
                <p>Ketenangan di balik pepohonan hijau.</p>
            </div>
        </div>

        <div class="gallery-item">
            <img src="https://images.unsplash.com/photo-1501785888041-af3ef285b470?q=80&w=1000" alt="Danau">
            <div class="overlay">
                <h3>Tepi Danau</h3>
                <p>Refleksi langit pada air yang tenang.</p>
            </div>
        </div>

        <div class="gallery-item">
            <img src="https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?q=80&w=1000" alt="Kabut">
            <div class="overlay">
                <h3>Puncak Kabut</h3>
                <p>Suasana dingin di ketinggian 2000 mdpl.</p>
            </div>
        </div>
    </div>

    <a href="index.html" class="nav-btn">Kembali ke Beranda</a>

</body>
</html>
