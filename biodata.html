<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biodata Profesional</title>
    <style>
        /* Google Fonts */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');

        :root {
            --primary: #4f46e5;
            --secondary: #6366f1;
            --text-dark: #1f2937;
            --text-light: #6b7280;
            --bg-body: #f8fafc;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-body);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Card Container */
        .profile-card {
            background: white;
            width: 100%;
            max-width: 450px;
            border-radius: 24px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            overflow: hidden;
            border: 1px solid #e2e8f0;
        }

        /* Top Accent */
        .card-header {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            height: 100px;
            width: 100%;
        }

        /* Profile Content */
        .card-body {
            padding: 0 30px 30px 30px;
            text-align: center;
        }

        .img-container {
            width: 120px;
            height: 120px;
            background: #fff;
            border-radius: 50%;
            margin: -60px auto 15px;
            padding: 5px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .img-container img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            background: #cbd5e1;
        }

        h2 {
            color: var(--text-dark);
            font-size: 1.5rem;
            font-weight: 600;
        }

        .tag {
            font-size: 0.85rem;
            color: var(--primary);
            font-weight: 600;
            background: #eef2ff;
            padding: 4px 12px;
            border-radius: 20px;
            display: inline-block;
            margin-top: 5px;
        }

        /* Data Section */
        .info-grid {
            margin-top: 25px;
            text-align: left;
        }

        .info-item {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px dashed #e2e8f0;
        }

        .info-item:last-child {
            border-bottom: none;
        }

        .label {
            color: var(--text-light);
            font-size: 0.9rem;
        }

        .value {
            color: var(--text-dark);
            font-weight: 500;
            font-size: 0.9rem;
        }

        /* Navigation Button */
        .btn-nav {
            display: block;
            margin-top: 25px;
            padding: 12px;
            background: var(--primary);
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-nav:hover {
            background: var(--secondary);
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.3);
        }

        /* Responsive */
        @media (max-width: 400px) {
            .profile-card {
                border-radius: 16px;
            }
            .card-body {
                padding: 0 20px 20px 20px;
            }
        }
    </style>
</head>
<body>

    <div class="profile-card">
        <div class="card-header"></div>
        
        <div class="card-body">
            <div class="img-container">
                <img src="Fotoku.jpg" alt="Foto Profil">
            </div>

            <h2>Muhammad Fahrizal Hasbi</h2>
            <span class="tag">Mahasiswa Aktif Universitas Lambung Mangkurat Sosial Ekonomi Perikanan</span>

            <div class="info-grid">
                <div class="info-item">
                    <span class="label">NIM</span>
                    <span class="value">2310715210013</span>
                </div>
                <div class="info-item">
                    <span class="label">Jurusan</span>
                    <span class="value">Sosial Ekonomi Perikanan</span>
                </div>
                <div class="info-item">
                    <span class="label">Email</span>
                    <span class="value">2310715210013@ulm.ac.id</span>
                </div>

            <a href="index.html" class="btn-nav">Kembali ke Beranda</a>
        </div>
    </div>

</body>
</html>
