<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome - My Portfolio</title>
    <style>
        /* Import Google Fonts */
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            /* Background gradien animasi bergerak */
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Navigation Bar */
        nav {
            padding: 20px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(10px);
            background: rgba(255, 255, 255, 0.1);
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }

        .logo {
            color: white;
            font-weight: 700;
            font-size: 1.5rem;
            letter-spacing: 1px;
        }

        nav ul {
            display: flex;
            list-style: none;
        }

        nav ul li {
            margin-left: 30px;
        }

        nav ul li a {
            color: white;
            text-decoration: none;
            font-weight: 400;
            transition: 0.3s;
            font-size: 0.9rem;
            opacity: 0.8;
        }

        nav ul li a:hover {
            opacity: 1;
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
        }

        /* Hero Section */
        .hero {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: white;
            padding: 20px;
        }

        .hero h1 {
            font-size: 4rem;
            font-weight: 700;
            margin-bottom: 10px;
            animation: fadeInUp 1s ease;
        }

        .hero p {
            font-size: 1.2rem;
            max-width: 600px;
            margin-bottom: 30px;
            opacity: 0.9;
            animation: fadeInUp 1.5s ease;
        }

        /* Tombol Animasi */
        .cta-container {
            display: flex;
            gap: 15px;
            animation: fadeInUp 2s ease;
        }

        .btn {
            padding: 12px 30px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            transition: 0.3s;
            border: 2px solid white;
        }

        .btn-primary {
            background: white;
            color: #e73c7e;
        }

        .btn-primary:hover {
            background: transparent;
            color: white;
        }

        .btn-outline {
            background: transparent;
            color: white;
        }

        .btn-outline:hover {
            background: white;
            color: #23a6d5;
        }

        /* Animasi Masuk */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Footer mini */
        footer {
            padding: 20px;
            text-align: center;
            color: white;
            font-size: 0.8rem;
            opacity: 0.6;
        }

        /* Responsive Mobile */
        @media (max-width: 768px) {
            nav { padding: 20px; }
            nav ul { display: none; } /* Sembunyikan menu di mobile untuk simpelnya */
            .hero h1 { font-size: 2.5rem; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">PORTFOLIO.</div>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="biodata.html">Biodata</a></li>
            <li><a href="gallery.html">Gallery</a></li>
            <li><a href="video.html">Video</a></li>
        </ul>
    </nav>

    <main class="hero">
        <h1>Halo, Saya Muhammad Fahrizal Hasbi </h1>
        <p>Selamat datang di website saya yang dihosting melalui GitHub Pages. Jelajahi perjalanan kreativitas saya di sini.</p>
        
        <div class="cta-container">
            <a href="biodata.html" class="btn btn-primary">Lihat biodata</a>
            <a href="gallery.html" class="btn btn-outline">Buka gallery</a>
             <a href="video.html" class="btn btn-outline">Buka video</a>
        </div>
    </main>

    <footer>
        &copy; 2026 - Digital Portfolio Project
    </footer>

</body>
</html>
