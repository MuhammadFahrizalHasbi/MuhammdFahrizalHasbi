<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <style>
    body { background-color: #f8f9fa; padding: 20px; }
    .form-container { background: white; padding: 30px; border-radius: 10px; shadow: 0 0 10px rgba(0,0,0,0.1); }
    h4 { border-bottom: 2px solid #0d6efd; padding-bottom: 10px; margin-top: 20px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="form-container shadow-sm mx-auto" style="max-width: 800px;">
      <h2 class="text-center mb-4">Formulir Pengumpulan Data</h2>
      <form id="dataForm" onsubmit="handleFormSubmit(this)">
        
        <h4>Data Demografi</h4>
        <div class="mb-3">
          <label class="form-label">Nama Lengkap</label>
          <input type="text" name="nama" class="form-control" required>
        </div>
        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label">Tanggal Lahir</label>
            <input type="date" name="tgl_lahir" class="form-control" required>
          </div>
          <div class="col-md-6 mb-3">
            <label class="form-label">Pendidikan Terakhir</label>
            <select name="pendidikan" class="form-select" required>
              <option value="">Pilih Pendidikan...</option>
              <option value="SD">SD</option>
              <option value="SMP">SMP</option>
              <option value="SMA/SMK">SMA/SMK</option>
              <option value="D3">DIPLOMA (D3)</option>
              <option value="S1">SARJANA (S1)</option>
              <option value="S2">MAGISTER (S2)</option>
              <option value="S3">DOKTOR (S3)</option>
            </select>
          </div>
        </div>
        <div class="mb-3">
          <label class="form-label">Alamat</label>
          <textarea name="alamat" class="form-control" rows="2"></textarea>
        </div>
        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label">No. Telepon</label>
            <input type="tel" name="telp" class="form-control">
          </div>
          <div class="col-md-6 mb-3">
            <label class="form-label">Email</label>
            <input type="email" name="email" class="form-control">
          </div>
        </div>

        <h4>Data Perbankan</h4>
        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label">Nama Bank</label>
            <input class="form-control" list="bankOptions" name="bank" placeholder="Cari bank...">
            <datalist id="bankOptions">
              <option value="Bank Mandiri">
              <option value="Bank BNI">
              <option value="Bank BRI">
              <option value="Bank BCA">
              <option value="Bank Syariah Indonesia (BSI)">
            </datalist>
          </div>
          <div class="col-md-6 mb-3">
            <label class="form-label">Nomor Rekening</label>
            <input type="number" name="rekening" class="form-control">
          </div>
        </div>

        <h4>Data Transaksi Keuangan</h4>
        <div class="mb-3">
          <label class="form-label">Tanggal Transaksi</label>
          <input type="date" name="tgl_transaksi" class="form-control" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Uraian Transaksi</label>
          <input type="text" name="uraian" class="form-control" placeholder="Contoh: Bayar Listrik">
        </div>
        <div class="mb-3">
          <label class="form-label d-block">Jenis Transaksi</label>
          <div class="btn-group w-100" role="group">
            <input type="radio" class="btn-check" name="jenis_transaksi" id="btnDebet" value="Debet" autocomplete="off">
            <label class="btn btn-outline-primary" for="btnDebet">Debet</label>
            <input type="radio" class="btn-check" name="jenis_transaksi" id="btnKredit" value="Kredit" autocomplete="off">
            <label class="btn btn-outline-primary" for="btnKredit">Kredit</label>
          </div>
        </div>
        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label">Nominal Debet</label>
            <input type="number" name="debet" class="form-control" value="0">
          </div>
          <div class="col-md-6 mb-3">
            <label class="form-label">Nominal Kredit</label>
            <input type="number" name="kredit" class="form-control" value="0">
          </div>
        </div>

        <button type="submit" class="btn btn-success w-100 mt-4" id="submitBtn">Kirim Data</button>
      </form>
      <div id="output" class="mt-3 text-center fw-bold"></div>
    </div>
  </div>

  <script>
    function handleFormSubmit(formObject) {
      document.getElementById('submitBtn').disabled = true;
      document.getElementById('output').innerHTML = "Sedang mengirim...";
      google.script.run.withSuccessHandler(showSuccess).processForm(formObject);
    }

    function showSuccess(msg) {
      document.getElementById('output').innerHTML = msg;
      document.getElementById('dataForm').reset();
      document.getElementById('submitBtn').disabled = false;
    }
  </script>
</body>
</html>
