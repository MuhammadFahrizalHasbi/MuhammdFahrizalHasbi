<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RGB Data Dashboard</title>
    <style>
        /* Global Styles */
        body {
            background-color: #0a0a0a;
            color: #ffffff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 3px;
            background: linear-gradient(to right, #ff0000, #00ff00, #0000ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 2.5rem;
        }

        .dashboard-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 30px;
            width: 100%;
            max-width: 1300px;
        }

        .form-card {
            background: #151515;
            padding: 25px;
            border-radius: 15px;
            width: 350px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .form-card:hover {
            transform: translateY(-10px);
        }

        .form-card h2 {
            margin-top: 0;
            font-size: 1.5rem;
            margin-bottom: 20px;
        }

        .input-group {
            margin-bottom: 15px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9rem;
            font-weight: bold;
        }

        input, select, textarea {
            width: 100%;
            padding: 10px;
            background: #222;
            border: 1px solid #444;
            color: white;
            border-radius: 5px;
            box-sizing: border-box;
            outline: none;
        }

        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            text-transform: uppercase;
            transition: 0.3s;
        }

        /* --- THEME RED: Demografi --- */
        .red-theme {
            border-top: 4px solid #ff0000;
            box-shadow: 0 4px 15px rgba(255, 0, 0, 0.1);
        }
        .red-theme:hover { box-shadow: 0 0 25px rgba(255, 0, 0, 0.4); }
        .red-theme h2, .red-theme label { color: #ff4d4d; }
        .red-theme input:focus { border-color: #ff0000; box-shadow: 0 0 5px #ff0000; }
        .red-theme .btn { background: #ff0000; color: white; }
        .red-theme .btn:hover { background: #b30000; box-shadow: 0 0 15px #ff0000; }

        /* --- THEME GREEN: Bank --- */
        .green-theme {
            border-top: 4px solid #00ff41;
            box-shadow: 0 4px 15px rgba(0, 255, 65, 0.1);
        }
        .green-theme:hover { box-shadow: 0 0 25px rgba(0, 255, 65, 0.4); }
        .green-theme h2, .green-theme label { color: #00ff41; font-family: 'Courier New', monospace; }
        .green-theme input:focus, .green-theme select:focus { border-color: #00ff41; box-shadow: 0 0 5px #00ff41; }
        .green-theme .btn { background: transparent; border: 2px solid #00ff41; color: #00ff41; }
        .green-theme .btn:hover { background: #00ff41; color: #000; box-shadow: 0 0 15px #00ff41; }

        /* --- THEME BLUE: Transaksi --- */
        .blue-theme {
            border-top: 4px solid #00d2ff;
            box-shadow: 0 4px 15px rgba(0, 210, 255, 0.1);
        }
        .blue-theme:hover { box-shadow: 0 0 25px rgba(0, 210, 255, 0.4); }
        .blue-theme h2, .blue-theme label { color: #00d2ff; }
        .blue-theme input:focus { border-color: #00d2ff; box-shadow: 0 0 5px #00d2ff; }
        .blue-theme .btn { background: linear-gradient(45deg, #00d2ff, #3a7bd5); color: white; }
        .blue-theme .btn:hover { letter-spacing: 1px; box-shadow: 0 0 15px #00d2ff; }

        .radio-group {
            display: flex;
            gap: 15px;
            align-items: center;
        }
        .radio-group input { width: auto; }

        /* Responsive */
        @media (max-width: 768px) {
            .dashboard-container { flex-direction: column; align-items: center; }
            .form-card { width: 90%; }
        }
    </style>
</head>
<body>

    <h1>RGB Data Control</h1>

    <div class="dashboard-container">
        
        <div class="form-card red-theme">
            <h2>Data Demografi</h2>
            <div class="input-group">
                <label>Nama Lengkap</label>
                <input type="text" placeholder="Masukkan nama...">
            </div>
            <div class="input-group">
                <label>Tanggal Lahir</label>
                <input type="date">
            </div>
            <div class="input-group">
                <label>Alamat Domisili</label>
                <textarea rows="3" placeholder="Alamat sesuai KTP..."></textarea>
            </div>
            <button class="btn">Simpan Identitas</button>
        </div>

        <div class="form-card green-theme">
            <h2>Informasi Bank</h2>
            <div class="input-group">
                <label>Pilih Bank</label>
                <select>
                    <option>Bank Mandiri</option>
                    <option>BCA</option>
                    <option>BNI</option>
                    <option>BRI</option>
                </select>
            </div>
            <div class="input-group">
                <label>Nomor Rekening</label>
                <input type="number" placeholder="8800xxxxxx">
            </div>
            <div class="input-group">
                <label>Nama Pemilik</label>
                <input type="text" placeholder="Nama sesuai tabungan">
            </div>
            <button class="btn">Aktivasi Akun</button>
        </div>

        <div class="form-card blue-theme">
            <h2>Data Transaksi</h2>
            <div class="input-group">
                <label>Tipe Aliran</label>
                <div class="radio-group">
                    <label><input type="radio" name="tr" checked> Masuk</label>
                    <label><input type="radio" name="tr"> Keluar</label>
                </div>
            </div>
            <div class="input-group">
                <label>Nominal (IDR)</label>
                <input type="text" placeholder="Contoh: 500.000">
            </div>
            <div class="input-group">
                <label>Keterangan</label>
                <input type="text" placeholder="Tujuan transaksi">
            </div>
            <button class="btn">Proses Transfer</button>
        </div>

    </div>
<script>
        const scriptURL = 'GANTI_DENGAN_URL_WEB_APP_ANDA'; // Tempel URL dari Langkah 2 di sini
        const form = document.getElementById('rgb-form');
        const btn = document.getElementById('submit-btn');

        form.addEventListener('submit', e => {
            e.preventDefault();
            btn.disabled = true;
            btn.innerHTML = 'Mengirim...';

            fetch(scriptURL, { method: 'POST', body: new FormData(form)})
                .then(response => {
                    alert('Data Berhasil Terkirim!');
                    btn.disabled = false;
                    btn.innerHTML = 'Kirim ke Spreadsheet';
                    form.reset();
                })
                .catch(error => {
                    console.error('Error!', error.message);
                    alert('Gagal mengirim data.');
                    btn.disabled = false;
                    btn.innerHTML = 'Kirim ke Spreadsheet';
                });
        });
    </script>
</body>
</html>
